services:
  - type: web
    name: gold-signal-tracker
    runtime: python
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    healthCheckPath: /health
    envVars:
      - key: TELEGRAM_API_ID
        sync: false
      - key: TELEGRAM_API_HASH
        sync: false
      - key: TELEGRAM_CHANNELS
        sync: false
      - key: TELEGRAM_SESSION
        sync: false
      - key: CLAUDE_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: TWELVE_DATA_KEY
        sync: false
      - key: ALPHA_VANTAGE_KEY
        sync: false
      - key: API_SECRET_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
